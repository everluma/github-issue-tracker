<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Issue Tracker Page</title>

    <!-- Font Awasome added  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>
<body class="main-body">

    <!-- Navbar  -->

   <nav class="navbar">

    <!-- Left Logo  -->
    <div class="logo">
        <img src="./assets/github-logo.png" alt="GitHub logo">
        <h2> GitHub Issues Tracker</h2>
    </div>

    <!-- Right Search Box  -->
    <div class="search-box">
        <input type="text"  id="searchInput"  placeholder="🔍  Search Issues...">
        <button id="searchBtn">+ New Issue </button>

    </div>
   </nav>

   <!-- Whole page section  -->
    <section class="whole-section">

        <!-- Tabs  -->
         <section class="taps">
            
            <button class="tap active" data-status="all">All</button>

            <button class="tap" data-status="open">Open</button>

            <button class="tap" data-status="closed">Closed</button>
         </section>


         <!-- Issue Info  -->
          <section class="issue-info">
            <!-- Issue Left  -->
            <div class="issue-left">
                <div class="image">
                    <img src="./assets/Aperture.png" alt="Aperture Logo">
                </div>

                <div class="left-p">
                    <h3><span id="issueCount">0</span> Issues</h3>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

            <!-- Issue Right  -->
             <div class="issue-right">
                <div><span class="open-marker">🟢 Open</span></div>
                
                <div><span class="close-marker">🟣 Closed</span></div>
             </div>
          </section>


          <!-- Issue Container  -->
           <section id="issuesContainer" class="issues-container">
            
           </section>
    


    </section>

    <script src="./main.js"></script>
    
</body>
</html>
