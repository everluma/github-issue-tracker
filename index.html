<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="login-section">
        
        <div class="login-container">

            <!-- Login Heading  -->

           <div class="login-heading">
            <img src="./assets/github-logo.png" alt="GitHub Logo">
            <h1>GitHub Issues Tracker</h1>
            
            <p>Sign in to manage your issues</p>
           </div>

           <!-- Login Body  -->

           <div class="login-body">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter Username">
            <p><small>Default:  admin</small></p>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter Password">
            <p><small>Default:  admin123</small></p>

            <button type="button">Sign In</button>
           </div>

           <!-- Or container  -->

           <div class="or-container">
            <div class="line-one"><hr></div>
            <div class="text"><p>OR</p></div>

            <div class="line-two"><hr></div>
           </div>

           <!-- Demo Credentials Section  -->

           <div class="demo-credentials">
            <h2>Demo Credentials:</h2>
            <div class="credentials-p">
                <p><span class="bold">Username:</span> admin</p>
                <p><span class="bold">Password:</span> admin123</p>
            </div>
           </div>

    </section>
    
    <script src="./index.js"></script>
</body>
</html>
